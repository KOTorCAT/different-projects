{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHREK — CONVERSE WITH THE OGRE</title>
    <link rel="stylesheet" href="{% static 'myapp/css/style.css' %}">
    <style>
        .chat-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 120px 40px 80px;
            min-height: 100vh;
        }
        
        .chat-header {
            text-align: center;
            margin-bottom: 60px;
        }
        
        .chat-header h1 {
            font-size: 3rem;
            margin-bottom: 20px;
        }
        
        .chat-header p {
            color: rgba(245,245,240,0.5);
            letter-spacing: 2px;
            font-size: 0.8rem;
        }
        
        .chat-messages {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            border: 0.5px solid rgba(245,245,240,0.1);
            background: rgba(10,10,10,0.3);
            margin-bottom: 30px;
        }
        
        .message {
            margin-bottom: 30px;
            animation: fadeInUp 0.4s ease-out;
        }
        
        .message.user {
            text-align: right;
        }
        
        .message-content {
            display: inline-block;
            max-width: 70%;
            padding: 15px 25px;
            border-radius: 20px;
            font-weight: 300;
            line-height: 1.5;
        }
        
        .user .message-content {
            background: rgba(245,245,240,0.1);
            border: 0.5px solid rgba(245,245,240,0.2);
        }
        
        .assistant .message-content {
            background: rgba(245,245,240,0.05);
            border: 0.5px solid rgba(245,245,240,0.1);
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
        }
        
        .message-sender {
            font-size: 0.7rem;
            letter-spacing: 3px;
            margin-bottom: 8px;
            opacity: 0.5;
            text-transform: uppercase;
        }
        
        .chat-input-area {
            display: flex;
            gap: 15px;
            border-top: 0.5px solid rgba(245,245,240,0.1);
            padding-top: 30px;
        }
        
        .chat-input {
            flex: 1;
            background: transparent;
            border: 0.5px solid rgba(245,245,240,0.2);
            padding: 15px 20px;
            color: #f5f5f0;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        
        .chat-input:focus {
            outline: none;
            border-color: rgba(245,245,240,0.6);
        }
        
        .send-button {
            padding: 15px 35px;
            background: transparent;
            border: 0.5px solid rgba(245,245,240,0.3);
            color: #f5f5f0;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 3px;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        
        .send-button:hover:not(:disabled) {
            border-color: rgba(245,245,240,0.8);
            letter-spacing: 4px;
            background: rgba(245,245,240,0.05);
        }
        
        .send-button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .typing-indicator {
            display: inline-block;
            padding: 12px 20px;
            background: rgba(245,245,240,0.05);
            border: 0.5px solid rgba(245,245,240,0.1);
            border-radius: 20px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
        
        .typing-indicator span {
            display: inline-block;
            animation: blink 1.4s infinite;
        }
        
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes blink {
            0%, 60%, 100% { opacity: 0; }
            30% { opacity: 1; }
        }
        
        .error-message {
            color: rgba(245,245,240,0.6);
            font-size: 0.8rem;
            text-align: center;
            margin-top: 20px;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        ::-webkit-scrollbar {
            width: 2px;
        }
        
        .clear-button {
            background: transparent;
            border: 0.5px solid rgba(245,245,240,0.15);
            color: rgba(245,245,240,0.5);
            padding: 8px 20px;
            cursor: pointer;
            font-size: 0.7rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        
        .clear-button:hover {
            border-color: rgba(245,245,240,0.4);
            color: rgba(245,245,240,0.8);
        }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/" class="logo">SHREK</a>
        <div class="nav-links">
            <a href="/">ACCUEIL</a>
            <a href="/about/">L'HISTOIRE</a>
            <a href="/chat/">CONVERSE</a>
        </div>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <h1>Converse</h1>
            <p>ENTER THE SWAMP · SPEAK WITH THE OGRE</p>
        </div>
        
        <div style="text-align: center;">
            <button class="clear-button" onclick="clearChat()">CLEAR HISTORY</button>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message assistant">
                <div class="message-sender">SHREK — THE OGRE</div>
                <div class="message-content">
                   Осел, что ты ты забыл на моем болоте?!
                </div>
            </div>
        </div>
        
        <div class="chat-input-area">
            <input type="text" class="chat-input" id="messageInput" placeholder="Your words..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send-button" id="sendButton" onclick="sendMessage()">SEND</button>
        </div>
        <div class="error-message" id="errorMessage"></div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const errorMessage = document.getElementById('errorMessage');
        
        let isWaiting = false;
        
        function sendMessage() {
            if (isWaiting) return;
            
            const message = messageInput.value.trim();
            if (!message) return;
            
            addMessage('user', message);
            messageInput.value = '';
            
            isWaiting = true;
            sendButton.disabled = true;
            errorMessage.textContent = '';
            
            const typingDiv = addTypingIndicator();
            
            fetch('/chat/api/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: message})
            })
            .then(response => response.json())
            .then(data => {
                removeTypingIndicator(typingDiv);
                if (data.error) {
                    errorMessage.textContent = data.error;
                    addMessage('assistant', "The swamp is restless... Try again later.");
                } else {
                    addMessage('assistant', data.reply);
                }
            })
            .catch(error => {
                removeTypingIndicator(typingDiv);
                errorMessage.textContent = 'Connection error. Please try again.';
                addMessage('assistant', "Something disturbs the swamp... Try again.");
            })
            .finally(() => {
                isWaiting = false;
                sendButton.disabled = false;
                messageInput.focus();
            });
        }
        
        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `
                <div class="message-sender">${role === 'user' ? 'YOU — THE VISITOR' : 'SHREK — THE OGRE'}</div>
                <div class="message-content">${escapeHtml(content)}</div>
            `;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function addTypingIndicator() {
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.innerHTML = `
                <div class="message-sender">SHREK — THE OGRE</div>
                <div class="typing-indicator">
                    The ogre is pondering<span>.</span><span>.</span><span>.</span>
                </div>
            `;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return div;
        }
        
        function removeTypingIndicator(element) {
            if (element && element.remove) element.remove();
        }
        
        function clearChat() {
            if (confirm('Clear conversation history? The ogre will forget everything.')) {
                fetch('/chat/clear/', {method: 'POST'})
                    .then(() => {
                        chatMessages.innerHTML = `
                            <div class="message assistant">
                                <div class="message-sender">SHREK — THE OGRE</div>
                                <div class="message-content">
                                    пошел прочь
                                </div>
                            </div>
                        `;
                    });
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
